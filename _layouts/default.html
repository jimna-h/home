<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>{{ site.title }}{% if page.title %} | {{ page.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/assets/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/assets/favicon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ site.title }}{% if page.title %} | {{ page.title }}{% endif %}" />
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/img/portrait.jpg" />
    <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}/{{ page.path | replace: 'index.html', '' }}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="{{ site.baseurl }}/css/styles.css" rel="stylesheet" />
    <link href="{{ site.baseurl }}/css/custom.css" rel="stylesheet" />
</head>
<body class="d-flex flex-column min-vh-100">
    {% include nav.html %}

    {{ content }}

    {% include footer.html %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ site.baseurl }}/js/scripts.js"></script>
</body>
</html>

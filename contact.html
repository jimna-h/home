    <link
        href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800"
        rel="stylesheet" type="text/css" />

<body>
    <!-- Navigation-->
    <nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
        <div class="container px-4 px-lg-5">
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto py-4 py-lg-0">
                    <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="about.html">résumé</a></li>
                    <!-- <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="post.html">Résumé</a></li> -->
                    <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Page Header-->
    <header class="masthead" style="background-image: url('assets/img/contact-bg.jpg')">
        <div class="container position-relative px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <div class="page-heading">
                        <h1>Contact Me</h1>
                        <span class="subheading">Let's get in touch.</span>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- Main Content-->
    <main class="mb-4">
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <p>Fill out the form below to send me a message and I will get back to you as soon as possible!</p>
                    <div class="my-5">
                        <!-- * * * * * * * * * * * * * * *-->
                        <!-- * * SB Forms Contact Form * *-->
                        <!-- * * * * * * * * * * * * * * *-->
                        <!-- This form is pre-integrated with SB Forms.-->
                        <!-- To make this form functional, sign up at-->
                        <!-- https://startbootstrap.com/solution/contact-forms-->
                        <!-- to get an API token!-->
                        <form action="https://formspree.io/f/xkowwpzj" method="POST">
                            <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
                                <!-- optional: set the email subject (Formspree recognizes "subject") -->
                                <input type="hidden" name="subject" value="New message from jameswbruce.github.io" />

                                <!-- spam honeypot (Formspree supports _gotcha on all plans) -->
                                <input type="text" name="_gotcha" style="display:none" />

                                <div class="form-floating">
                                    <input class="form-control" id="name" name="name" type="text"
                                        placeholder="Enter your name..." required />
                                    <label for="name">Name</label>
                                </div>

                                <div class="form-floating">
                                    <input class="form-control" id="email" name="email" type="email"
                                        placeholder="Enter your email..." required />
                                    <label for="email">Email address</label>
                                </div>

                                <div class="form-floating">
                                    <input class="form-control" id="phone" name="phone" type="tel"
                                        placeholder="Enter your phone number..." />
                                    <label for="phone">Phone Number</label>
                                </div>

                                <div class="form-floating">
                                    <textarea class="form-control" id="message" name="message"
                                        placeholder="Enter your message here..." style="height: 12rem"
                                        required></textarea>
                                    <label for="message">Message</label>
                                </div>

                                <br />

                                <button class="btn btn-primary text-uppercase" id="submitButton"
                                    type="submit">Send</button>
                            </form>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- Footer-->
    <footer class="border-top">
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <div class="small text-center text-muted fst-italic">Copyright &copy; Your Website 2025</div>
                </div>
            </div>
        </div>
    </footer>
    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS-->
    <script src="js/scripts.js"></script>

</body>

</html>

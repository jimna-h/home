<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>James Bruce | Contact</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css" />
    <link href="css/styles.css" rel="stylesheet" />
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-light fixed-top" id="mainNav">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="index.html">James Bruce</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                Menu <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto py-4 py-lg-0">
                    <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="resume.html">Resume</a></li>
                    <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="projects.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <header class="masthead" style="background-image: url('assets/img/contact-bg.jpg')">
        <div class="container position-relative px-4 px-lg-5">
            <div class="row px-4 px-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <div class="page-heading">
                        <h1>Contact</h1>
                        <span class="subheading">Get In Touch</span>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main class="container px-4 px-lg-5 my-4 flex-grow-1">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <p>Have a question or want to collaborate on something? Drop a message below.</p>
                <div class="my-4">
                    <form id="contactForm">
                        <div class="form-floating border-bottom mb-2">
                            <input class="form-control border-0 shadow-none px-0" id="name" type="text" placeholder="Name" required />
                            <label class="px-0" for="name">Name</label>
                        </div>
                        <div class="form-floating border-bottom mb-2">
                            <input class="form-control border-0 shadow-none px-0" id="email" type="email" placeholder="Email" required />
                            <label class="px-0" for="email">Email address</label>
                        </div>
                        <div class="form-floating border-bottom mb-4">
                            <textarea class="form-control border-0 shadow-none px-0" id="message" placeholder="Message" style="height: 10rem" required></textarea>
                            <label class="px-0" for="message">Message</label>
                        </div>
                        <button class="btn btn-primary text-uppercase" type="submit">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer class="border-top py-4 bg-light w-100">
        <div class="container px-4 px-lg-5">
            <div class="small text-center text-muted">© 2026 James Bruce. All rights reserved.</div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

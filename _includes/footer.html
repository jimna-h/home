<!-- Shared footer. Social links come from _config.yml (site.social). -->
<footer class="border-top py-4 bg-light w-100">
    <div class="container px-4 px-lg-5 text-center">
        <div class="footer-links">
            <a href="{{ site.social.github }}" target="_blank" rel="noopener" aria-label="GitHub"><i class="fab fa-github"></i></a>
            <a href="{{ site.social.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="mailto:{{ site.social.email }}" aria-label="Email"><i class="fas fa-envelope"></i></a>
        </div>
        <div class="small text-muted">© 2026 {{ site.title }}</div>
    </div>
</footer>

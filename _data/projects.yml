# To add a project: copy one block below and edit the fields.
#   name        Title shown on the card
#   meta        Small line under the title (type / tech / category)
#   description 1-2 sentences on what it does
#   url         Where the whole card links (live app, or repo if there's no app)
#   source      GitHub repo for the "Source" button (can match url)
#   image       Optional thumbnail (e.g. a screenshot of the app). Drop the
#               file in assets/img/ and set the path here. Remove or comment
#               out the line to show a text-only card. A ~16:10 crop looks best.
# Order here = order on the page.

- name: tweave
  meta: "R package · cross-platform CLI · Typst"
  description: >-
    An R package and command-line tool that weaves live R code into Typst
    documents and compiles them straight to PDF — Sweave's idea, rebuilt for
    Typst. One-command install, a tested knitr hook layer, and a companion
    Typst template for statistics homework with auto-numbered questions and
    a few personal preference stats math shorthands.
  url: https://github.com/jimna-h/tweave
  source: https://github.com/jimna-h/tweave

- name: EDHREC Hipster Quotient
  meta: "Live data extraction · vanilla JS"
  description: >-
    Scores how mainstream your Commander decks are by extracting each
    commander's popularity rank live from EDHREC's page payloads (there's no official
    API) with slug normalization for accented and double-faced card names,
    request throttling and caching, and an outlier-robust score built on a
    weighted median. Scryfall-powered autocomplete included.
  url: https://jimna-h.github.io/edhrec-hipster-quotient/
  source: https://github.com/jimna-h/edhrec-hipster-quotient
  image: assets/img/edhrec-hipster.png

- name: Manufactor
  meta: "Rules-engine modeling · offline-first PWA"
  description: >-
    An installable, offline-capable token counter for artifact-token-heavy Magic:
    The Gathering decks. Models the game's stacking replacement effects as an ordered
    pipeline: additive token increasers, sequential Academy Manufactor passes, then
    multiplicitive token increasers, with per-deck profiles that persist between games.
  url: https://jimna-h.github.io/manufactor/
  source: https://github.com/jimna-h/manufactor
  image: assets/img/manufactor.jpg

- name: Prowess
  meta: "Magic: The Gathering · web app"
  description: >-
    A per-turn tracker for prowess and storm decks. Log each spell as you cast
    it and the app derives the storm count and buff totals across your
    creatures in real time, so you don't have to.
  url: https://jimna-h.github.io/prowess/
  source: https://github.com/jimna-h/prowess

- name: Duckbill Cap Helmets
  meta: "Minecraft · resource pack · data pack"
  description: >-
    A resource-and-data-pack pair that replaces every Minecraft helmet with an
    Irish duckbill cap when renamed to "duckbill". Some projects are purely for fun.
  url: https://github.com/jimna-h/duckbill_cap_helmets
  source: https://github.com/jimna-h/duckbill_cap_helmets
